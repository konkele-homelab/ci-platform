name: Build Container Image

on:
  workflow_dispatch:

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build Container Image

    uses: your-org/ci-platform/.github/workflows/build-container.yaml@v1

    with:
      # Optional registry override.
      # Defaults to vars.CI_REGISTRY.
      registry: ""

      # Optional namespace override.
      # Defaults to vars.CI_REGISTRY_NAMESPACE.
      registry_namespace: ""

      # BuildKit cache namespace.
      #
      # Cache location:
      # <registry>/<cache_namespace>/<image>:buildcache-<platform>
      cache_namespace: ci-cache

      # Required image path inside the registry namespace.
      image_name: example-image

      # Primary output tag.
      #
      # The tag must be generated by metadata-action.
      primary_tag: latest

      # GitHub Actions runner label.
      runner: ci-build

      # Container used for the workflow job.
      container_image: ghcr.io/actions/actions-runner:latest

      # Target build platform(s).
      #
      # Multiple platforms:
      # linux/amd64,linux/arm64
      platforms: linux/amd64

      # Dockerfile path.
      dockerfile: Dockerfile

      # Build context.
      context: .

      # Remote BuildKit daemon.
      buildkit_host: tcp://buildkitd.buildkit.svc.cluster.local:1234

      # Dockerfile build arguments.
      #
      # One argument per line.
      build_args: |
        APP_ENV=production
        BUILD_VERSION=${{ github.sha }}

      # Additional image tags.
      #
      # Built-in tags include:
      # - branch
      # - pull request
      # - commit SHA
      # - semantic versions
      # - latest for releases/default branch
      extra_tags: |
        type=raw,value=example
        type=raw,value=build-${{ github.run_number }}

    secrets:
      # Option 1 (recommended): explicitly pass only required secrets
      CI_REGISTRY_USERNAME: ${{ secrets.CI_REGISTRY_USERNAME }}
      CI_REGISTRY_PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}

      # Option 2: inherit all available secrets
      #
      # Replace the block above with:
      #
      # secrets: inherit
      #
      # This passes all secrets available to the calling workflow
      # into the reusable workflow. Use this only when the reusable
      # workflow is trusted and you intentionally want it to have
      # access to all caller secrets.