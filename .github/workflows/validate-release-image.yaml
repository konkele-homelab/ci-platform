name: Validate Release Image

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to validate"
        required: true
        type: string

permissions:
  contents: read

env:
  IMAGE_NAME: ci-platform-test-image

jobs:
  prepare:
    name: Prepare Release Tag

    runs-on:
      - ci-build

    container:
      image: ghcr.io/actions/actions-runner:latest

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Determine image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "image_tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Validate Release Image

    needs:
      - prepare

    uses: ./.github/workflows/validate-container.yaml

    secrets:
      CI_REGISTRY_USERNAME: ${{ secrets.CI_REGISTRY_USERNAME }}
      CI_REGISTRY_PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}

    with:
      tags: |
        ${{ vars.CI_REGISTRY }}/${{ vars.CI_REGISTRY_NAMESPACE }}/ci-platform-test-image:${{ needs.prepare.outputs.image_tag }}

      runner: ci-build