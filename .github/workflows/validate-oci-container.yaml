name: Validate OCI Container Image

on:
  workflow_call:
    inputs:
      registry:
        description: "OCI registry hostname"
        required: false
        type: string

      registry_namespace:
        description: "OCI registry namespace/project"
        required: false
        type: string

      image_name:
        description: "Registry image path"
        required: true
        type: string

      image_tag:
        description: "Image tag to validate"
        required: false
        default: latest
        type: string

      runner:
        description: "Runner label"
        required: false
        default: ci-build
        type: string

      container_image:
        description: "GitHub Actions job container"
        required: false
        default: ghcr.io/actions/actions-runner:latest
        type: string

      test_command:
        description: |
          Optional command to execute inside the container.
          Example: cat /message.txt
        required: false
        default: ""
        type: string

      pull_only:
        description: "Only verify image pull"
        required: false
        default: false
        type: boolean

    secrets:
      CI_REGISTRY_USERNAME:
        required: true

      CI_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

env:
  REGISTRY: ${{ inputs.registry || vars.CI_REGISTRY }}
  REGISTRY_NAMESPACE: ${{ inputs.registry_namespace || vars.CI_REGISTRY_NAMESPACE }}

jobs:
  validate:
    name: Validate ${{ inputs.image_name }}
    timeout-minutes: 10

    runs-on:
      - ${{ inputs.runner }}

    container:
      image: ${{ inputs.container_image }}

    env:
      IMAGE: ${{ inputs.registry || vars.CI_REGISTRY }}/${{ inputs.registry_namespace || vars.CI_REGISTRY_NAMESPACE }}/${{ inputs.image_name }}:${{ inputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker
        run: docker --version

      - name: Login to OCI Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CI_REGISTRY_USERNAME }}
          password: ${{ secrets.CI_REGISTRY_PASSWORD }}

      - name: Pull Image
        run: |
          echo "Validating ${IMAGE}"
          docker pull "${IMAGE}"

      - name: Inspect OCI Image
        run: docker image inspect "${IMAGE}"

      - name: Run Container Test
        if: ${{ !inputs.pull_only && inputs.test_command != '' }}
        run: |
          docker run --rm \
            "${IMAGE}" \
            sh -c "${{ inputs.test_command }}"