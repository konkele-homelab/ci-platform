name: Validate Container Images

on:
  workflow_call:
    inputs:
      tags:
        description: |
          Newline-separated list of fully-qualified OCI image tags
          to validate.
        required: true
        type: string

      runner:
        description: Runner label
        required: false
        default: ci-build
        type: string

      registry:
        description: |
          OCI registry hostname used for crane authentication.
        required: false
        type: string

      validation_image:
        description: |
          Container image used as the validation runtime.
          Must provide a POSIX shell.
        required: false
        default: harbor.lab.konkel.us/ci/container-validator:latest
        type: string

    secrets:
      CI_REGISTRY_USERNAME:
        required: true

      CI_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Published OCI Images

    timeout-minutes: 10

    runs-on:
      - ${{ inputs.runner }}

    container:
      image: ${{ inputs.validation_image }}

    env:
      IMAGE_TAGS: ${{ inputs.tags }}
      INPUT_REGISTRY: ${{ inputs.registry }}

    steps:
      - name: Install crane
        shell: sh
        run: |
          set -eu

          apk add --no-cache ca-certificates curl tar

          curl -sL \
            https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin crane

          chmod +x /usr/local/bin/crane

          crane version

      - name: Authenticate crane
        shell: sh
        env:
          USERNAME: ${{ secrets.CI_REGISTRY_USERNAME }}
          PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
        run: |
          set -eu

          if [ -z "${IMAGE_TAGS}" ]; then
            echo "No image tags were provided."
            exit 1
          fi

          REGISTRY="${INPUT_REGISTRY}"

          if [ -z "${REGISTRY}" ]; then
            REGISTRY=$(
              printf '%s\n' "${IMAGE_TAGS}" |
              sed '/^$/d' |
              head -n1 |
              cut -d/ -f1
            )
          fi

          if [ -z "${REGISTRY}" ]; then
            echo "Unable to determine registry hostname."
            exit 1
          fi

          echo "Logging into ${REGISTRY}"

          crane auth login \
            "${REGISTRY}" \
            --username "${USERNAME}" \
            --password "${PASSWORD}"

      - name: Validate published images
        shell: sh
        run: |
          set -eu

          printf '%s\n' "${IMAGE_TAGS}" |
          while IFS= read -r tag
          do
            [ -n "${tag}" ] || continue

            echo
            echo "Validating ${tag}"

            crane digest "${tag}"
            crane manifest "${tag}" >/dev/null
            crane config "${tag}" >/dev/null

            echo "✓ ${tag}"
          done

      - name: Validation summary
        shell: sh
        run: |
          set -eu

          echo
          echo "Successfully validated:"

          printf '%s\n' "${IMAGE_TAGS}" |
          while IFS= read -r tag
          do
            [ -n "${tag}" ] && echo "  ✓ ${tag}"
          done