name: Validate Container Images

on:
  workflow_call:

    inputs:
      tags:
        description: |
          Comma-separated list of fully-qualified OCI image tags
          to validate.
        required: true
        type: string

      runner:
        description: Runner label
        required: false
        default: ci-build
        type: string

      registry:
        description: |
          OCI registry hostname used for crane authentication.
        required: false
        type: string

      image:
        description: |
          Validation container image containing crane.
        required: true
        type: string

    secrets:
      CI_REGISTRY_USERNAME:
        required: true

      CI_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Published OCI Images

    timeout-minutes: 10

    runs-on:
      - ${{ inputs.runner }}

    container:
      image: ${{ inputs.image }}

      credentials:
        username: ${{ secrets.CI_REGISTRY_USERNAME }}
        password: ${{ secrets.CI_REGISTRY_PASSWORD }}

    steps:
      - name: Verify validation inputs
        env:
          IMAGE_TAGS: ${{ inputs.tags }}
        run: |
          set -eu

          if [ -z "${IMAGE_TAGS}" ]; then
            echo "No image tags supplied for validation."
            exit 1
          fi

      - name: Authenticate crane with OCI registry
        env:
          INPUT_REGISTRY: ${{ inputs.registry }}
          IMAGE_TAGS: ${{ inputs.tags }}
        run: |
          set -eu

          REGISTRY="${INPUT_REGISTRY}"

          if [ -z "${REGISTRY}" ]; then
            REGISTRY=$(printf '%s' "${IMAGE_TAGS}" | cut -d, -f1 | cut -d/ -f1)
          fi

          crane auth login \
            "${REGISTRY}" \
            --username "${{ secrets.CI_REGISTRY_USERNAME }}" \
            --password "${{ secrets.CI_REGISTRY_PASSWORD }}"

      - name: Validate published OCI images
        env:
          IMAGE_TAGS: ${{ inputs.tags }}
        run: |
          set -eu

          echo "Using validation runtime:"
          crane version
          echo

          printf '%s' "${IMAGE_TAGS}" | tr ',' '\n' | while IFS= read -r tag; do
            [ -z "${tag}" ] && continue

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Validating ${tag}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            crane digest "${tag}"
            crane manifest "${tag}" >/dev/null
            crane config "${tag}" >/dev/null

            echo "✓ ${tag}"
          done

      - name: Validation summary
        env:
          IMAGE_TAGS: ${{ inputs.tags }}
        run: |
          set -eu

          echo "Successfully validated:"

          printf '%s' "${IMAGE_TAGS}" | tr ',' '\n' | while IFS= read -r tag; do
            [ -z "${tag}" ] && continue
            echo "  ✓ ${tag}"
          done