name: Validate Container Images

on:
  workflow_call:
    inputs:
      tags:
        description: |
          Newline-separated list of fully-qualified OCI image tags
          to validate.
        required: true
        type: string

      runner:
        description: Runner label
        required: false
        default: ci-build
        type: string

      registry:
        description: |
          OCI registry hostname used for crane authentication.
        required: false
        type: string

      image:
        description: |
          Container image used to run the validation.
        required: true
        type: string

    secrets:
      CI_REGISTRY_USERNAME:
        required: true

      CI_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Published OCI Images

    timeout-minutes: 10

    runs-on:
      - ${{ inputs.runner }}

    container:
      image: ${{ inputs.image }}

      credentials:
        username: ${{ secrets.CI_REGISTRY_USERNAME }}
        password: ${{ secrets.CI_REGISTRY_PASSWORD }}

    env:
      IMAGE_TAGS: ${{ inputs.tags }}
      INPUT_REGISTRY: ${{ inputs.registry }}

    steps:
      - name: Verify validation runtime
        run: |
          set -eu

          command -v crane >/dev/null

          crane version

      - name: Authenticate crane
        env:
          USERNAME: ${{ secrets.CI_REGISTRY_USERNAME }}
          PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
        run: |
          set -eu

          [ -n "${IMAGE_TAGS}" ]

          REGISTRY="${INPUT_REGISTRY}"

          if [ -z "${REGISTRY}" ]; then
            REGISTRY="$(printf '%s\n' "${IMAGE_TAGS}" \
              | sed '/^$/d' \
              | head -n1 \
              | cut -d/ -f1)"
          fi

          echo "Logging into ${REGISTRY}"

          crane auth login \
            "${REGISTRY}" \
            --username "${USERNAME}" \
            --password "${PASSWORD}"

      - name: Validate images
        run: |
          set -eu

          printf '%s\n' "${IMAGE_TAGS}" |
          while IFS= read -r tag
          do
            [ -z "${tag}" ] && continue

            echo
            echo "Validating ${tag}"

            crane digest "${tag}"
            crane manifest "${tag}" >/dev/null
            crane config "${tag}" >/dev/null

            echo "✓ ${tag}"
          done

      - name: Validation summary
        run: |
          set -eu

          echo
          echo "Successfully validated:"

          printf '%s\n' "${IMAGE_TAGS}" |
          while IFS= read -r tag
          do
            [ -n "${tag}" ] && echo "  ✓ ${tag}"
          done