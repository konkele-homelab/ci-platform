name: Validate Container Images

on:
  workflow_call:
    inputs:
      tags:
        description: |
          Newline-separated list of fully-qualified OCI image tags
          to validate.
        required: true
        type: string

      runner:
        description: Runner label
        required: false
        default: ci-build
        type: string

      registry:
        description: OCI registry hostname
        required: false
        type: string

      validation_image:
        description: |
          Container image used as the validation runtime.
          Must provide a POSIX shell.
        required: false
        default: harbor.lab.konkel.us/ci/container-validator:latest
        type: string

    secrets:
      CI_REGISTRY_USERNAME:
        required: true

      CI_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

env:
  REGISTRY: ${{ inputs.registry || vars.CI_REGISTRY }}

jobs:
  validate:
    name: Validate Published OCI Images

    timeout-minutes: 10

    concurrency:
      group: validate-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    runs-on:
      - ${{ inputs.runner }}

    container:
      image: ${{ inputs.validation_image }}

    env:
      IMAGE_TAGS: ${{ inputs.tags }}

    steps:
      - name: Validate registry configuration
        shell: sh
        run: |
          set -eu

          if [ -z "${REGISTRY}" ]; then
            echo "Registry is not configured."
            echo "Set inputs.registry or repository variable CI_REGISTRY."
            exit 1
          fi

      - name: Validate input images
        shell: sh
        run: |
          set -eu

          if [ -z "${IMAGE_TAGS}" ]; then
            echo "No image tags were provided."
            exit 1
          fi

      - name: Authenticate crane
        shell: sh
        env:
          USERNAME: ${{ secrets.CI_REGISTRY_USERNAME }}
          PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
        run: |
          set -eu

          echo "Logging into ${REGISTRY}"

          crane auth login \
            "${REGISTRY}" \
            --username "${USERNAME}" \
            --password "${PASSWORD}"

      - name: Validate published images
        shell: sh
        run: |
          set -eu

          printf '%s\n' "${IMAGE_TAGS}" |
          while IFS= read -r tag
          do
            [ -n "${tag}" ] || continue

            echo
            echo "Validating ${tag}"

            crane digest "${tag}"
            crane manifest "${tag}" >/dev/null
            crane config "${tag}" >/dev/null

            echo "✓ ${tag}"
          done