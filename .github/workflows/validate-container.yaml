name: Validate Container Images

on:
  workflow_call:

    inputs:
      tags:
        description: |
          Newline-separated list of fully-qualified OCI image tags
          to validate.
        required: true
        type: string

      runner:
        description: Runner label
        required: false
        default: ci-build
        type: string

      registry:
        description: |
          OCI registry hostname used for crane authentication.
          Example: harbor.example.com
        required: false
        type: string

      image:
        description: |
          Validation container image containing crane.
        required: true
        type: string

    secrets:
      CI_REGISTRY_USERNAME:
        required: true

      CI_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Published OCI Images

    timeout-minutes: 10

    runs-on:
      - ${{ inputs.runner }}

    container:
      image: ${{ inputs.image }}

      credentials:
        username: ${{ secrets.CI_REGISTRY_USERNAME }}
        password: ${{ secrets.CI_REGISTRY_PASSWORD }}

    steps:

      - name: Verify validation inputs
        shell: bash
        env:
          IMAGE_TAGS: ${{ inputs.tags }}
        run: |
          set -euo pipefail

          if [ -z "${IMAGE_TAGS}" ]; then
            echo "No image tags supplied for validation."
            exit 1
          fi

          echo "Images to validate:"
          printf '%s\n' "${IMAGE_TAGS}"

      - name: Authenticate crane with OCI registry
        shell: bash
        env:
          INPUT_REGISTRY: ${{ inputs.registry }}
          IMAGE_TAGS: ${{ inputs.tags }}
          USERNAME: ${{ secrets.CI_REGISTRY_USERNAME }}
          PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          REGISTRY="${INPUT_REGISTRY}"

          if [ -z "${REGISTRY}" ]; then
            FIRST_IMAGE="$(printf '%s\n' "${IMAGE_TAGS}" | sed '/^$/d' | head -n1)"

            if [ -z "${FIRST_IMAGE}" ]; then
              echo "Unable to determine registry from image tags."
              exit 1
            fi

            REGISTRY="$(echo "${FIRST_IMAGE}" | cut -d/ -f1)"
          fi

          echo "Authenticating crane against:"
          echo "${REGISTRY}"

          crane auth login \
            "${REGISTRY}" \
            --username "${USERNAME}" \
            --password "${PASSWORD}"


      - name: Validate published OCI images
        shell: bash
        env:
          IMAGE_TAGS: ${{ inputs.tags }}
        run: |
          set -euo pipefail

          echo "Using validation runtime:"
          crane version
          echo

          printf '%s\n' "${IMAGE_TAGS}" | while IFS= read -r tag; do

            [ -z "${tag}" ] && continue

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Validating:"
            echo "${tag}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            crane digest "${tag}"
            crane manifest "${tag}" >/dev/null
            crane config "${tag}" >/dev/null

            echo "✓ ${tag}"
            echo

          done

      - name: Validation summary
        shell: bash
        env:
          IMAGE_TAGS: ${{ inputs.tags }}
        run: |
          set -euo pipefail

          echo "Successfully validated:"

          printf '%s\n' "${IMAGE_TAGS}" | while IFS= read -r tag; do
            [ -z "${tag}" ] && continue
            echo "  ✓ ${tag}"
          done