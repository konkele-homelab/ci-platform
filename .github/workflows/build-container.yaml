name: Build Container Image

on:
  workflow_call:
    outputs:
      image:
        description: Fully-qualified image name without tag
        value: ${{ jobs.build.outputs.image }}

      reference:
        description: Immutable SHA image reference
        value: ${{ jobs.build.outputs.reference }}

      tags:
        description: Published image tags
        value: ${{ jobs.build.outputs.tags }}

    inputs:
      registry:
        description: OCI registry hostname
        required: false
        type: string

      registry_namespace:
        description: OCI registry namespace/project
        required: false
        type: string

      cache_namespace:
        description: OCI registry namespace/project for BuildKit cache storage
        required: false
        default: ci-cache
        type: string

      image_name:
        description: Registry image path
        required: true
        type: string

      runner:
        description: Runner label
        required: false
        default: ci-build
        type: string

      container_image:
        description: Container image used for the GitHub Actions job
        required: false
        default: ghcr.io/actions/actions-runner:latest
        type: string

      platforms:
        description: Target platform(s)
        required: false
        default: linux/amd64
        type: string

      dockerfile:
        description: Dockerfile path
        required: false
        default: Dockerfile
        type: string

      context:
        description: Build context directory
        required: false
        default: .
        type: string

      buildkit_host:
        description: Remote BuildKit endpoint
        required: false
        default: tcp://buildkitd.buildkit.svc.cluster.local:1234
        type: string

      build_args:
        description: |
          Build arguments.
          One BUILD_ARG=value per line.
        required: false
        default: ""
        type: string

      extra_tags:
        description: |
          Optional additional metadata-action tags.
        required: false
        default: ""
        type: string

    secrets:
      CI_REGISTRY_USERNAME:
        required: true

      CI_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

env:
  REGISTRY: ${{ inputs.registry || vars.CI_REGISTRY }}
  REGISTRY_NAMESPACE: ${{ inputs.registry_namespace || vars.CI_REGISTRY_NAMESPACE }}

jobs:
  build:
    name: Build ${{ inputs.image_name }}

    timeout-minutes: 60

    concurrency:
      group: build-${{ github.repository }}-${{ inputs.image_name }}-${{ github.ref }}
      cancel-in-progress: true

    runs-on:
      - ${{ inputs.runner }}

    container:
      image: ${{ inputs.container_image }}

    outputs:
      image: ${{ steps.image.outputs.image }}
      reference: ${{ steps.image.outputs.reference }}
      tags: ${{ steps.tags.outputs.tags }}

    steps:
      - name: Validate registry configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${REGISTRY}" ]]; then
            echo "Registry is not configured."
            echo "Set inputs.registry or repository variable CI_REGISTRY."
            exit 1
          fi

          if [[ -z "${REGISTRY_NAMESPACE}" ]]; then
            echo "Registry namespace is not configured."
            echo "Set inputs.registry_namespace or repository variable CI_REGISTRY_NAMESPACE."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Build Tools
        run: |
          docker --version
          docker buildx version

      - name: Login to OCI Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CI_REGISTRY_USERNAME }}
          password: ${{ secrets.CI_REGISTRY_PASSWORD }}

      - name: Configure Remote BuildKit Builder
        id: builder
        shell: bash
        env:
          BUILDKIT_HOST: ${{ inputs.buildkit_host }}
        run: |
          set -euo pipefail

          BUILDER="remote-${{ github.run_id }}"

          echo "builder=${BUILDER}" >> "$GITHUB_OUTPUT"

          docker buildx create \
            --name "${BUILDER}" \
            --driver remote \
            "${BUILDKIT_HOST}"

          docker buildx use "${BUILDER}"
          docker buildx inspect --bootstrap

      - name: Generate OCI Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ inputs.image_name }}

          tags: |
            type=ref,event=branch
            type=ref,event=pr

            type=sha,prefix=sha-

            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}

            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            ${{ inputs.extra_tags }}

          labels: |
            org.opencontainers.image.title=${{ inputs.image_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.created={{date 'YYYY-MM-DDTHH:mm:ssZ'}}

      - name: Export Image Tags
        id: tags
        shell: bash
        run: |
          {
            echo 'tags<<EOF'
            printf '%s\n' "${{ steps.meta.outputs.tags }}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Export Image References
        id: image
        shell: bash
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ inputs.image_name }}
          GENERATED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail

          SHA_REFERENCE=$(printf '%s\n' "${GENERATED_TAGS}" | grep -F "${IMAGE_NAME}:sha-" | head -n1)

          if [ -z "${SHA_REFERENCE}" ]; then
            echo "Unable to determine SHA image reference."
            echo
            echo "Generated tags:"
            printf '%s\n' "${GENERATED_TAGS}"
            exit 1
          fi

          echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "reference=${SHA_REFERENCE}" >> "$GITHUB_OUTPUT"

      - name: Verify SHA Reference Exists
        shell: bash
        env:
          SHA_REFERENCE: ${{ steps.image.outputs.reference }}
          GENERATED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail

          if ! printf '%s\n' "${GENERATED_TAGS}" | grep -Fxq "${SHA_REFERENCE}"; then
            echo "SHA reference was not generated:"
            echo "  ${SHA_REFERENCE}"
            echo
            echo "Generated tags:"
            printf '%s\n' "${GENERATED_TAGS}"
            exit 1
          fi

      - name: Build and Push OCI Image
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_LABELS: ${{ steps.meta.outputs.labels }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_ARGS=()

          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            TAG_ARGS+=(--tag "$tag")
          done <<< "$IMAGE_TAGS"

          LABEL_ARGS=()

          while IFS= read -r label; do
            [[ -z "$label" ]] && continue
            LABEL_ARGS+=(--label "$label")
          done <<< "$IMAGE_LABELS"

          BUILD_ARGS=(
            --build-arg "REGISTRY=${REGISTRY}"
            --build-arg "REGISTRY_NAMESPACE=${REGISTRY_NAMESPACE}"
          )

          while IFS= read -r arg; do
            [[ -z "$arg" || "$arg" =~ ^# ]] && continue
            BUILD_ARGS+=(--build-arg "$arg")
          done <<< "${{ inputs.build_args }}"

          CACHE_SUFFIX=$(echo "${{ inputs.platforms }}" | tr '/, ' '---')

          CACHE_REF="${REGISTRY}/${{ inputs.cache_namespace }}/${{ inputs.image_name }}:buildcache-${CACHE_SUFFIX}"

          docker buildx build \
            --builder "${{ steps.builder.outputs.builder }}" \
            --file "${{ inputs.dockerfile }}" \
            --platform "${{ inputs.platforms }}" \
            "${TAG_ARGS[@]}" \
            "${LABEL_ARGS[@]}" \
            "${BUILD_ARGS[@]}" \
            --cache-from type=registry,ref="${CACHE_REF}" \
            --cache-to type=registry,ref="${CACHE_REF}",mode=max \
            --provenance=false \
            --sbom=false \
            --push \
            "${{ inputs.context }}"

      - name: Cleanup BuildKit Builder
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          docker buildx rm "${{ steps.builder.outputs.builder }}" || true